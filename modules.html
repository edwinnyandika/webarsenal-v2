<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence Catalog | De{c0}ded Hub v5.5.0</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/layout.js"></script>
  <style>
    .m-table { width: 100%; border-collapse: collapse; margin-top: 2rem; border-radius: 4px; overflow: hidden; }
    .m-table th { background: var(--glass); text-align: left; padding: 1.5rem; font-family: var(--ff-d); font-size: 0.7rem; text-transform: uppercase; border-bottom: 2px solid var(--fire); color: var(--paper); }
    .m-table td { padding: 1.5rem; border-bottom: 1px solid var(--glass-border); font-size: 0.85rem; background: rgba(255,255,255,0.01); }
    .m-code { font-family: var(--ff-m); color: #5af78e; font-size: 0.7rem; border: 1px solid rgba(90, 247, 142, 0.1); padding: 0.8rem 1.2rem; border-radius: 4px; background: rgba(0,0,0,0.5); }
    .cat-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 0.8rem 1.6rem; border-radius: 4px; color: var(--fog); font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    .cat-btn.active { color: var(--fire); border-color: var(--fire); background: var(--fire-dim); }
  </style>
</head>
<body>

<main class="content-surface">
  <header class="reveal" style="padding-top: 3rem; margin-bottom: 3rem;">
    <div style="color: var(--fire); font-size: 0.70rem; font-weight: 800; letter-spacing: 0.35em; margin-bottom: 1.5rem;">RESOURCE_CATALOG // V5.5.0</div>
    <h1 class="sec-h">Intelligence <span class="glow">Directory.</span></h1>
    <p class="sec-p">A complete inventory of the 552 specialized security modules in the De{c0}ded Hub repository.</p>
  </header>

  <div class="reveal" style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-bottom: 3rem;">
    <input type="text" id="mSearch" class="glass" placeholder="Search the Arsenal (e.g. 'xss', 'awws')..." style="flex: 1; padding: 1.2rem 2rem; border-radius: 4px; color: var(--paper); outline: none;" oninput="render(document.querySelector('.cat-btn.active').dataset.cat, this.value)">
    <div style="display: flex; gap: 0.8rem;">
      <button class="cat-btn active" data-cat="all" onclick="filterM('all', this)">All</button>
      <button class="cat-btn" data-cat="analyzers" onclick="filterM('analyzers', this)">Analyzers</button>
      <button class="cat-btn" data-cat="scrapers" onclick="filterM('scrapers', this)">Scrapers</button>
      <button class="cat-btn" data-cat="core" onclick="filterM('core', this)">Core</button>
    </div>
  </div>

  <table class="m-table reveal">
    <thead>
      <tr>
        <th style="width: 15%;">Category</th>
        <th>Script Name</th>
        <th>CLI Blueprint</th>
      </tr>
    </thead>
    <tbody id="mBody">
      <!-- Generated -->
    </tbody>
  </table>
</main>

<script src="js/catalog.js"></script>
<script>
const MODULES = window.WEBARSENAL_CATALOG || [];
const mBody = document.getElementById('mBody');

function render(filter = 'all', query = '') {
  if (!mBody) return;
  mBody.innerHTML = '';
  const filtered = MODULES.filter(m => {
    const matchCat = filter === 'all' || m.category === filter;
    return matchCat && m.name.toLowerCase().includes(query.toLowerCase());
  }).slice(0, 100);

  filtered.forEach(m => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td style="color: var(--fire); font-weight: 800; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em;">${m.category}</td>
      <td style="font-family: var(--ff-d); font-weight: 800; font-size: 1rem;">${m.name}</td>
      <td><div class="m-code">node ${m.category}/${m.name} --url {target.com}</div></td>
    `;
    mBody.appendChild(row);
  });
}

function filterM(c, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(c, document.getElementById('mSearch').value);
}

document.addEventListener('DOMContentLoaded', () => render());
</script>

</body>
</html>
