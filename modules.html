const mBody = document.getElementById('mBody');

function render(filter = 'all', query = '') {
  if (!mBody) return;
  mBody.innerHTML = '';
  const filtered = MODULES.filter(m => {
    const matchCat = filter === 'all' || m.Category === filter;
    return matchCat && m.Name.toLowerCase().includes(query.toLowerCase());
  });

  filtered.forEach(m => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td style="color:var(--fire); font-weight:800; text-transform:uppercase; font-size:0.65rem; letter-spacing:0.05em;">${m.Category}</td>
      <td style="font-family:var(--ff-d); font-weight:800;">${m.Name}</td>
      <td><div class="m-code">node ${m.Category}/${m.Name} --url {target}</div></td>
    `;
    mBody.appendChild(row);
  });
}

function filterM(c, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(c, document.getElementById('mSearch').value);
}

document.addEventListener('DOMContentLoaded', () => {
    render();
});
