<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Channel | De{c0}ded Hub v5.5.0</title>
  <link rel="stylesheet" href="style.css">
  <script src="layout.js"></script>
</head>
<body>

<main class="content-surface">
  <header class="reveal" style="padding-top: 3rem; margin-bottom: 3rem;">
    <div style="color: var(--fire); font-size: 0.70rem; font-weight: 800; letter-spacing: 0.35em; margin-bottom: 1.5rem;">SECURE_INPUT_CHANNEL // V5.5.0</div>
    <h1 class="sec-h">Initiate <span class="glow">Contact.</span></h1>
    <p class="sec-p" style="max-width: 500px;">Secure, encrypted communications for bug reports, partnership inquiries, and corporate consultation.</p>
  </header>

  <section class="reveal glass" style="padding: 4.5rem; border-radius: 4px; max-width: 900px; margin-bottom: 6rem;">
    <form style="display: flex; flex-direction: column; gap: 2rem;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <input type="text" class="glass" placeholder="NAME / ALIAS" style="padding: 1.25rem 1.8rem; border-radius: 4px; color: var(--paper); outline: none; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);">
        <input type="email" class="glass" placeholder="SECURE EMAIL" style="padding: 1.25rem 1.8rem; border-radius: 4px; color: var(--paper); outline: none; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);">
      </div>
      <textarea class="glass" placeholder="ENCRYPTED MESSAGE CONTENT" rows="6" style="padding: 1.25rem 1.8rem; border-radius: 4px; color: var(--paper); outline: none; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);"></textarea>
      <button type="button" class="glass" style="padding: 1.25rem; border-radius: 4px; background: var(--fire-dim); border: 1px solid var(--fire); color: var(--fire); font-weight: 800; text-transform: uppercase; cursor: pointer; letter-spacing: 0.2em; transition: 0.4s var(--ease);">Broadcast Signal</button>
    </form>
  </section>
</main>

</body>
</html>
