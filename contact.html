<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact — WebArsenal Security Inquiry</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a09'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%23e8390e' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23e8390e'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
<script src="js/layout.js"></script>
</head>
<body>

<main class="container" style="transition: opacity 0.4s var(--ease);">
  <section class="con-grid" style="display:grid; grid-template-columns: 1fr 1.3fr; gap:6rem; padding-top:8rem; margin-bottom:8rem;">
    <div class="reveal">
       <span style="font-size:0.65rem; color:var(--fire); text-transform:uppercase; letter-spacing:0.25em; margin-bottom:2rem; display:block; font-weight:800;">DIRECT INQUIRY</span>
       <h1 class="sec-h">Engage the <br/><span>Architect.</span></h1>
       <p class="sec-p">For enterprise security consultation, custom module development, or community collaboration, use the secure channel below.</p>
       
       <div style="margin-top: 4rem;">
          <h4 style="font-family: var(--ff-d); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 2rem; letter-spacing:0.1em; opacity:0.8;">Social Architecture</h4>
          <div style="display:grid; gap:1.5rem;">
            <a href="https://github.com/edwinnyandika" target="_blank" style="display:flex; align-items:center; gap:1rem; color:var(--fog); text-decoration:none; transition: color 0.3s;" onmouseover="this.style.color='var(--fire)'" onmouseout="this.style.color='var(--fog)'">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                <span>GitHub // @edwinnyandika</span>
            </a>
            <a href="#" style="display:flex; align-items:center; gap:1rem; color:var(--fog); text-decoration:none; transition: color 0.3s;" onmouseover="this.style.color='var(--fire)'" onmouseout="this.style.color='var(--fog)'">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span>Discord // WebArsenal Community</span>
            </a>
            <a href="#" style="display:flex; align-items:center; gap:1rem; color:var(--fog); text-decoration:none; transition: color 0.3s;" onmouseover="this.style.color='var(--fire)'" onmouseout="this.style.color='var(--fog)'">
                <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span>LinkedIn // de{c0}de by edwin dev</span>
            </a>
          </div>
       </div>
    </div>

    <div class="reveal glass-box" style="padding: 4rem; border-color:rgba(232, 57, 14, 0.1);">
       <form style="display:grid; gap:2.5rem;" onsubmit="event.preventDefault(); alert('Message sent to the Architect.');">
          <div style="border-bottom: 1px solid rgba(242, 240, 232, 0.1); padding-bottom: 1rem; position: relative;">
             <label style="font-size: 0.6rem; color: var(--fog); text-transform: uppercase; display: block; margin-bottom: 0.5rem;">Researcher Name</label>
             <input type="text" placeholder="John Doe" required style="background: none; border: none; width: 100%; color: var(--paper); font-family: var(--ff-m); font-size: 1.1rem; outline: none;">
          </div>
          <div style="border-bottom: 1px solid rgba(242, 240, 232, 0.1); padding-bottom: 1rem; position: relative;">
             <label style="font-size: 0.6rem; color: var(--fog); text-transform: uppercase; display: block; margin-bottom: 0.5rem;">Secure Email</label>
             <input type="email" placeholder="john@example.com" required style="background: none; border: none; width: 100%; color: var(--paper); font-family: var(--ff-m); font-size: 1.1rem; outline: none;">
          </div>
          <div style="border-bottom: 1px solid rgba(242, 240, 232, 0.1); padding-bottom: 1rem; position: relative;">
             <label style="font-size: 0.6rem; color: var(--fog); text-transform: uppercase; display: block; margin-bottom: 0.5rem;">Mission Brief</label>
             <textarea rows="5" placeholder="Detailed description of your security inquiry..." style="background: none; border: none; width: 100%; color: var(--paper); font-family: var(--ff-m); font-size: 1.1rem; outline: none; resize: none;"></textarea>
          </div>
          <button type="submit" class="btn-fire" style="margin-top: 1rem; border-radius:3px;">Initialize Communication</button>
       </form>
    </div>
  </section>
</main>

<script>
// Content handled by layout.js
</script>
</body>
</html>
