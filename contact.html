<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact — WebArsenal Security Inquiry</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a09'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%23e8390e' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23e8390e'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css">
<style>
/* Contact Page Specific */
.con-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 6rem; margin-top: 10rem; }
.con-label { font-size: 0.65rem; color: var(--fire); text-transform: uppercase; letter-spacing: 0.25em; margin-bottom: 2rem; display: block; }

.con-form { display: grid; gap: 2rem; }
.inp-wrap { border-bottom: 1px solid rgba(242, 240, 232, 0.1); padding-bottom: 1rem; position: relative; }
.inp-wrap label { font-size: 0.6rem; color: var(--fog); text-transform: uppercase; display: block; margin-bottom: 0.5rem; transition: 0.3s; }
.inp-wrap input, .inp-wrap textarea { background: none; border: none; width: 100%; color: var(--paper); font-family: var(--ff-m); font-size: 1.1rem; padding: 0.5rem 0; outline: none; }
.inp-wrap::after { content: ''; position: absolute; bottom: -1.5px; left: 0; width: 0; height: 2px; background: var(--fire); transition: width 0.4s var(--ease); }
.inp-wrap:focus-within::after { width: 100%; }

@media (max-width: 900px) {
  .con-grid { grid-template-columns: 1fr; }
}
</style>
<script src="js/layout.js"></script>
</head>
<body>


<main class="container">
  <div class="con-grid">
    <div class="reveal">
       <span class="con-label">DIRECT INQUIRY</span>
       <h1 class="sec-h">Engage the <br/><span>Architect.</span></h1>
       <p class="sec-p">For enterprise security consultation, custom module development, or community collaboration, use the secure channel below.</p>
       
       <div style="margin-top: 4rem;">
          <h4 style="font-family: var(--ff-d); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 1rem;">Social Architecture</h4>
          <a href="https://github.com/edwinnyandika" target="_blank" style="color: var(--fog); text-decoration: none; display: block; margin-bottom: 0.5rem;">GitHub // @edwinnyandika</a>
          <a href="#" style="color: var(--fog); text-decoration: none; display: block; margin-bottom: 0.5rem;">Discord // WebArsenal Community</a>
          <a href="#" style="color: var(--fog); text-decoration: none; display: block; margin-bottom: 0.5rem;">LinkedIn // de{c0}de by edwin dev</a>
       </div>
    </div>

    <div class="reveal glass-box" style="padding: 4rem;">
       <form class="con-form" onsubmit="event.preventDefault(); alert('Message sent to the Architect.');">
          <div class="inp-wrap">
             <label>Researcher Name</label>
             <input type="text" placeholder="John Doe" required>
          </div>
          <div class="inp-wrap">
             <label>Secure Email</label>
             <input type="email" placeholder="john@example.com" required>
          </div>
          <div class="inp-wrap">
             <label>Subject</label>
             <input type="text" placeholder="Enterprise Audit Request">
          </div>
          <div class="inp-wrap">
             <label>Mission Brief</label>
             <textarea rows="5" placeholder="Detailed description of your security inquiry..."></textarea>
          </div>
          <button type="submit" class="btn-fire" style="margin-top: 1rem;">Initialize Communication</button>
       </form>
    </div>
  </div>
</main>


</body>
</html>
